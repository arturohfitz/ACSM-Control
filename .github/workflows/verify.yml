name: Verify

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: constructora-web/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m venv constructora-api/.venv
          constructora-api/.venv/bin/python -m pip install --upgrade pip
          constructora-api/.venv/bin/python -m pip install -r constructora-api/requirements.txt

      - name: Install frontend dependencies
        run: npm ci
        working-directory: constructora-web

      - name: Run verification
        run: ./scripts/verify.sh
