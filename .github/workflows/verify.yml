name: Verify

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+psycopg://constructora:constructora@localhost:5432/constructora_db

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: constructora
          POSTGRES_PASSWORD: constructora
          POSTGRES_DB: constructora_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U constructora -d constructora_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: constructora-web/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m venv constructora-api/.venv
          constructora-api/.venv/bin/python -m pip install --upgrade pip
          constructora-api/.venv/bin/python -m pip install -r constructora-api/requirements.txt

      - name: Install frontend dependencies
        run: npm ci
        working-directory: constructora-web

      - name: Run database migrations
        run: |
          source .venv/bin/activate
          PYTHONPATH=. alembic upgrade head
        working-directory: constructora-api

      - name: Run verification
        run: ./scripts/verify.sh

      - name: Run database integration tests
        run: |
          source .venv/bin/activate
          RUN_DB_TESTS=1 PYTHONPATH=. python -m unittest discover -s tests -p "*_db.py"
        working-directory: constructora-api
